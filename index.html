
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>This is my first project</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            background-color: #ffffff;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        img {
            border-radius: 50%; /* ปรับให้รูปเป็นวงกลมจะดูเท่กว่าครับ */
            width: 150px;
            height: 150px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 5px solid #e74c3c;
        }
        h1 { color: #e74c3c; margin-top: 0; }
        p { font-size: 1.1rem; }
.btn {
    display: inline-block;
    background-color: #3498db; /* สีฟ้า */
    color: white;
    padding: 12px 24px;
    text-decoration: none; /* เอาเส้นใต้ตัวหนังสือออก */
    border-radius: 30px;
    font-weight: bold;
    margin-top: 20px;
    transition: background 0.3s; /* ทำให้เวลาเปลี่ยนสีดูสมูท */
}

.btn:hover {
    background-color: #2980b9; /* สีจะเข้มขึ้นเมื่อเอาเมาส์วาง */
}
    </style>
</head>
<body>
    <div class="container">
        <img src="my-profile.jpg" alt="My picture">
        <h1>Welcome to my website! 🚀</h1>
        <p>I'm learning to use Git and GitHub Pages</p><a href="https://facebook.com/your-profile" class="btn">ติดตามบน Facebook</a>
    </div>
</body>
</html>
