
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>โปรเจกต์แรกของผม</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            background-color: #ffffff;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 80%;
        }
        /* แต่งรูปภาพให้สวยงาม */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* ทำรูปเป็นวงกลม */
            object-fit: cover;
            border: 5px solid #e74c3c;
            margin-bottom: 20px;
        }
        h1 { color: #e74c3c; margin-top: 0; }
        p { font-size: 1.2rem; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <img src="my-profile.jpg" alt="รูปของฉัน" class="profile-img">
        
        <h1>ยินดีต้อนรับสู่เว็บไซต์ของผม! 🚀</h1>
        <p>ผมกำลังเรียนรู้การใช้ Git และ GitHub Pages</p>
        <p>นี่คือผลงานชิ้นแรกที่ผมภูมิใจนำเสนอครับ</p>
    </div>
</body>
</html>
